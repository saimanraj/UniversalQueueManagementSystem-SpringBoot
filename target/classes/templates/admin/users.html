<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - UQS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div class="sidebar bg-dark text-white d-flex flex-column" style="width:240px; min-height:100vh">
        <div class="p-4 border-bottom border-secondary">
            <i class="fas fa-ticket-alt me-2 text-warning"></i>
            <span class="fw-bold fs-5">UQS Admin</span>
        </div>
        <nav class="nav flex-column p-3 flex-grow-1">
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/dashboard"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/vendors"><i class="fas fa-store me-2"></i>Vendors</a>
            <a class="nav-link text-white active rounded-3 mb-1 px-3" href="/admin/users"><i class="fas fa-users me-2"></i>Users</a>
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/queues"><i class="fas fa-list me-2"></i>Queues</a>
        </nav>
        <div class="p-3 border-top border-secondary">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-outline-danger btn-sm w-100 rounded-3"><i class="fas fa-sign-out-alt me-2"></i>Logout</button>
            </form>
        </div>
    </div>

    <div class="flex-grow-1 bg-light">
        <div class="bg-white shadow-sm px-4 py-3">
            <h5 class="mb-0 fw-bold"><i class="fas fa-users me-2 text-primary"></i>All Users</h5>
        </div>
        <div class="p-4">
            <!-- Search -->
            <div class="mb-4">
                <input type="text" class="form-control rounded-3" id="userSearch"
                       placeholder="🔍 Search users by name, email or role...">
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="usersTable">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Role</th>
                                    <th class="pe-4">Joined</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u : ${users}">
                                    <td class="ps-4 text-muted small" th:text="${u.id}"></td>
                                    <td class="fw-semibold" th:text="${u.name}"></td>
                                    <td th:text="${u.email}"></td>
                                    <td th:text="${u.phone ?: '-'}"></td>
                                    <td>
                                        <span th:switch="${u.role.name()}">
                                            <span th:case="'ADMIN'" class="badge bg-danger rounded-pill">
                                                <i class="fas fa-shield-alt me-1"></i>Admin
                                            </span>
                                            <span th:case="'VENDOR'" class="badge bg-success rounded-pill">
                                                <i class="fas fa-store me-1"></i>Vendor
                                            </span>
                                            <span th:case="'CUSTOMER'" class="badge bg-primary rounded-pill">
                                                <i class="fas fa-user me-1"></i>Customer
                                            </span>
                                        </span>
                                    </td>
                                    <td class="pe-4">
                                        <small class="text-muted"
                                               th:text="${#temporals.format(u.createdAt, 'dd MMM yyyy')}"></small>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('userSearch').addEventListener('keyup', function() {
    const q = this.value.toLowerCase();
    document.querySelectorAll('#usersTable tbody tr').forEach(row => {
        row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
});
</script>
</body>
</html>
