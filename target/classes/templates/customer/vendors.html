<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Vendors - UQS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/customer/dashboard">
            <i class="fas fa-ticket-alt me-2"></i>UQS System
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/customer/dashboard"><i class="fas fa-home me-1"></i>Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="/customer/vendors"><i class="fas fa-store me-1"></i>Find Vendors</a></li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline-light btn-sm rounded-pill">
                            <i class="fas fa-sign-out-alt me-1"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1">Available Vendors</h4>
            <p class="text-muted mb-0">Browse and join queues near you</p>
        </div>
        <div class="input-group" style="width:280px">
            <span class="input-group-text"><i class="fas fa-search"></i></span>
            <input type="text" class="form-control" id="searchInput" placeholder="Search vendors...">
        </div>
    </div>

    <div th:if="${#lists.isEmpty(vendors)}" class="text-center py-5">
        <i class="fas fa-store-slash fa-4x text-muted mb-3"></i>
        <h5 class="text-muted">No approved vendors available yet</h5>
        <p class="text-muted">Check back later or contact admin</p>
    </div>

    <div class="row g-4" id="vendorGrid">
        <div class="col-md-6 col-lg-4 vendor-card" th:each="vendor : ${vendors}">
            <div class="card border-0 shadow-sm rounded-4 h-100 hover-card">
                <div class="card-body p-4">
                    <!-- Category Icon + Badge -->
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="vendor-icon rounded-3 p-3 bg-primary bg-opacity-10">
                            <i class="fas fa-store fa-lg text-primary"></i>
                        </div>
                        <span class="badge bg-success rounded-pill">Approved</span>
                    </div>

                    <h5 class="fw-bold mb-1" th:text="${vendor.shopName}">Shop Name</h5>
                    <p class="text-muted small mb-2">
                        <i class="fas fa-tag me-1"></i>
                        <span th:text="${vendor.category ?: 'General'}"></span>
                    </p>
                    <p class="text-muted small mb-3" th:if="${vendor.address}">
                        <i class="fas fa-map-marker-alt me-1"></i>
                        <span th:text="${vendor.address}"></span>
                    </p>
                    <p class="text-muted small mb-3" th:if="${vendor.description}">
                        <span th:text="${vendor.description}"></span>
                    </p>

                    <!-- Avg service time -->
                    <div class="d-flex align-items-center gap-2 mb-3">
                        <div class="badge bg-light text-dark border">
                            <i class="fas fa-clock text-warning me-1"></i>
                            ~<span th:text="${vendor.avgServiceTime}"></span> min/customer
                        </div>
                    </div>

                    <a th:href="@{/customer/join/{id}(id=${vendor.id})}"
                       class="btn btn-primary w-100 rounded-3 fw-semibold">
                        <i class="fas fa-plus me-2"></i>Join Queue
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Live search
document.getElementById('searchInput').addEventListener('keyup', function() {
    const query = this.value.toLowerCase();
    document.querySelectorAll('.vendor-card').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(query) ? '' : 'none';
    });
});
</script>
</body>
</html>
