# ==========================================
# Online Queue Management System - Config
# ==========================================

# Server
server.port=8080

# Database Configuration - UPDATE THESE VALUES
spring.datasource.url=jdbc:mysql://localhost:3306/uqs_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Saiman@Raj2006
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize schema on startup (creates tables if not exist)
# Set to 'never' after first run if you want to skip re-running schema.sql
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.uqs=DEBUG
logging.level.org.springframework.security=WARN

# Session
server.servlet.session.timeout=30m

# Multipart (file upload)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
