<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - UQS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<!-- Sidebar Layout -->
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white d-flex flex-column" style="width:240px; min-height:100vh">
        <div class="p-4 border-bottom border-secondary">
            <i class="fas fa-ticket-alt me-2 text-warning"></i>
            <span class="fw-bold fs-5">UQS Admin</span>
        </div>
        <nav class="nav flex-column p-3 flex-grow-1">
            <a class="nav-link text-white active rounded-3 mb-1 px-3" href="/admin/dashboard">
                <i class="fas fa-tachometer-alt me-2"></i>Dashboard
            </a>
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/vendors">
                <i class="fas fa-store me-2"></i>Vendors
            </a>
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/users">
                <i class="fas fa-users me-2"></i>Users
            </a>
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/queues">
                <i class="fas fa-list me-2"></i>Queues
            </a>
        </nav>
        <div class="p-3 border-top border-secondary">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-outline-danger btn-sm w-100 rounded-3">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 bg-light">
        <!-- Top Bar -->
        <div class="bg-white shadow-sm px-4 py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">Dashboard Overview</h5>
            <div class="text-muted">
                <i class="fas fa-user-shield me-2 text-warning"></i>
                <span th:text="${user.name}">Admin</span>
            </div>
        </div>

        <div class="p-4">
            <!-- Flash messages -->
            <div th:if="${success}" class="alert alert-success alert-dismissible rounded-3">
                <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                <button class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Stats Cards -->
            <div class="row g-4 mb-4">
                <div class="col-6 col-xl-3">
                    <div class="card border-0 shadow-sm rounded-4 h-100">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted small mb-1">Total Users</p>
                                    <h3 class="fw-bold mb-0" th:text="${stats.totalUsers}">0</h3>
                                </div>
                                <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                                    <i class="fas fa-users fa-lg text-primary"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-xl-3">
                    <div class="card border-0 shadow-sm rounded-4 h-100">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted small mb-1">Total Vendors</p>
                                    <h3 class="fw-bold mb-0" th:text="${stats.totalVendors}">0</h3>
                                </div>
                                <div class="rounded-circle bg-success bg-opacity-10 p-3">
                                    <i class="fas fa-store fa-lg text-success"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-xl-3">
                    <div class="card border-0 shadow-sm rounded-4 h-100">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted small mb-1">Pending Approval</p>
                                    <h3 class="fw-bold mb-0 text-warning" th:text="${stats.pendingVendors}">0</h3>
                                </div>
                                <div class="rounded-circle bg-warning bg-opacity-10 p-3">
                                    <i class="fas fa-clock fa-lg text-warning"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-xl-3">
                    <div class="card border-0 shadow-sm rounded-4 h-100">
                        <div class="card-body p-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-muted small mb-1">Active Queues</p>
                                    <h3 class="fw-bold mb-0 text-success" th:text="${stats.activeQueues}">0</h3>
                                </div>
                                <div class="rounded-circle bg-info bg-opacity-10 p-3">
                                    <i class="fas fa-list fa-lg text-info"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pending Vendors Table -->
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-header bg-white border-0 pt-4 pb-0 px-4 d-flex align-items-center justify-content-between">
                    <h5 class="fw-bold mb-0">
                        <i class="fas fa-clock me-2 text-warning"></i>Pending Vendor Approvals
                    </h5>
                    <a href="/admin/vendors" class="btn btn-sm btn-outline-primary rounded-pill">View All</a>
                </div>
                <div class="card-body p-4">
                    <div th:if="${#lists.isEmpty(pendingVendors)}" class="text-center py-4">
                        <i class="fas fa-check-circle fa-2x text-success mb-2"></i>
                        <p class="text-muted">No pending approvals!</p>
                    </div>
                    <div class="table-responsive" th:unless="${#lists.isEmpty(pendingVendors)}">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Shop Name</th>
                                    <th>Category</th>
                                    <th>Owner</th>
                                    <th>Registered</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="vendor : ${pendingVendors}">
                                    <td class="fw-semibold" th:text="${vendor.shopName}"></td>
                                    <td><span class="badge bg-light text-dark border" th:text="${vendor.category ?: 'General'}"></span></td>
                                    <td th:text="${vendor.user.name}"></td>
                                    <td><small th:text="${#temporals.format(vendor.createdAt, 'dd MMM yyyy')}"></small></td>
                                    <td>
                                        <div class="d-flex gap-2">
                                            <form th:action="@{/admin/vendors/{id}/approve(id=${vendor.id})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <button class="btn btn-sm btn-success rounded-pill px-3">
                                                    <i class="fas fa-check me-1"></i>Approve
                                                </button>
                                            </form>
                                            <form th:action="@{/admin/vendors/{id}/reject(id=${vendor.id})}" method="post">
                                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                <button class="btn btn-sm btn-outline-danger rounded-pill px-3">
                                                    <i class="fas fa-times me-1"></i>Reject
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
