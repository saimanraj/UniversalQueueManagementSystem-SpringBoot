<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Queues - UQS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <meta http-equiv="refresh" content="15">
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white d-flex flex-column" style="width:240px; min-height:100vh">
        <div class="p-4 border-bottom border-secondary">
            <i class="fas fa-ticket-alt me-2 text-warning"></i>
            <span class="fw-bold fs-5">UQS Admin</span>
        </div>
        <nav class="nav flex-column p-3 flex-grow-1">
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/dashboard">
                <i class="fas fa-tachometer-alt me-2"></i>Dashboard
            </a>
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/vendors">
                <i class="fas fa-store me-2"></i>Vendors
            </a>
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/users">
                <i class="fas fa-users me-2"></i>Users
            </a>
            <a class="nav-link text-white active rounded-3 mb-1 px-3" href="/admin/queues">
                <i class="fas fa-list me-2"></i>Queues
            </a>
        </nav>
        <div class="p-3 border-top border-secondary">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-outline-danger btn-sm w-100 rounded-3">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 bg-light">
        <div class="bg-white shadow-sm px-4 py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">
                <i class="fas fa-list me-2 text-info"></i>Live Queue Monitor
            </h5>
            <span class="badge bg-light text-dark border">
                <i class="fas fa-sync-alt me-1 text-primary"></i>Auto-refresh every 15 seconds
            </span>
        </div>

        <div class="p-4">
            <div th:if="${#lists.isEmpty(queueInfos)}" class="text-center py-5">
                <i class="fas fa-store-slash fa-3x text-muted mb-3"></i>
                <h5 class="text-muted">No approved vendors yet</h5>
                <p class="text-muted">Approve vendors from the <a href="/admin/vendors">Vendors</a> page.</p>
            </div>

            <div class="row g-4">
                <div class="col-md-6 col-xl-4" th:each="info : ${queueInfos}">
                    <div class="card border-0 shadow-sm rounded-4 h-100"
                         th:classappend="${info.isActive and !info.isPaused} ? 'border-start border-success border-3' : ''">
                        <div class="card-body p-4">
                            <!-- Header -->
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h6 class="fw-bold mb-1" th:text="${info.shopName}">Shop Name</h6>
                                    <span class="badge bg-light text-dark border small"
                                          th:text="${info.category ?: 'General'}">Category</span>
                                </div>
                                <!-- Status Badge -->
                                <span th:if="${info.isActive and !info.isPaused}"
                                      class="badge bg-success rounded-pill">
                                    <i class="fas fa-circle me-1" style="font-size:8px"></i>Active
                                </span>
                                <span th:if="${info.isPaused}"
                                      class="badge bg-warning text-dark rounded-pill">
                                    <i class="fas fa-pause me-1"></i>Paused
                                </span>
                                <span th:if="${!info.isActive}"
                                      class="badge bg-secondary rounded-pill">
                                    <i class="fas fa-stop me-1"></i>Closed
                                </span>
                            </div>

                            <!-- Stats -->
                            <div class="row text-center g-2 mt-2">
                                <div class="col-4">
                                    <div class="bg-warning bg-opacity-10 rounded-3 py-2">
                                        <div class="fw-bold fs-4 text-warning"
                                             th:text="${info.waitingCount}">0</div>
                                        <div class="text-muted" style="font-size:11px">Waiting</div>
                                    </div>
                                </div>
                                <div class="col-4">
                                    <div class="bg-info bg-opacity-10 rounded-3 py-2">
                                        <div class="fw-bold fs-4 text-info"
                                             th:text="${info.currentToken}">0</div>
                                        <div class="text-muted" style="font-size:11px">Now Serving</div>
                                    </div>
                                </div>
                                <div class="col-4">
                                    <div class="bg-primary bg-opacity-10 rounded-3 py-2">
                                        <div class="fw-bold fs-4 text-primary"
                                             th:text="${info.avgServiceTime} + 'm'">5m</div>
                                        <div class="text-muted" style="font-size:11px">Avg Time</div>
                                    </div>
                                </div>
                            </div>

                            <!-- ETA total -->
                            <div class="mt-3 text-center text-muted small" th:if="${info.isActive}">
                                <i class="fas fa-clock me-1"></i>
                                Total wait: ~<span th:text="${info.waitingCount * info.avgServiceTime}">0</span> min
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
