<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Vendors - UQS Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">
    <div class="sidebar bg-dark text-white d-flex flex-column" style="width:240px; min-height:100vh">
        <div class="p-4 border-bottom border-secondary">
            <i class="fas fa-ticket-alt me-2 text-warning"></i>
            <span class="fw-bold fs-5">UQS Admin</span>
        </div>
        <nav class="nav flex-column p-3 flex-grow-1">
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/dashboard">
                <i class="fas fa-tachometer-alt me-2"></i>Dashboard
            </a>
            <a class="nav-link text-white active rounded-3 mb-1 px-3" href="/admin/vendors">
                <i class="fas fa-store me-2"></i>Vendors
            </a>
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/users">
                <i class="fas fa-users me-2"></i>Users
            </a>
            <a class="nav-link text-white-50 rounded-3 mb-1 px-3" href="/admin/queues">
                <i class="fas fa-list me-2"></i>Queues
            </a>
        </nav>
        <div class="p-3 border-top border-secondary">
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-outline-danger btn-sm w-100 rounded-3">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </button>
            </form>
        </div>
    </div>

    <div class="flex-grow-1 bg-light">
        <div class="bg-white shadow-sm px-4 py-3">
            <h5 class="mb-0 fw-bold"><i class="fas fa-store me-2 text-success"></i>Vendor Management</h5>
        </div>
        <div class="p-4">
            <div th:if="${success}" class="alert alert-success alert-dismissible rounded-3">
                <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                <button class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Nav Tabs -->
            <ul class="nav nav-tabs mb-4" id="vendorTabs">
                <li class="nav-item">
                    <a class="nav-link active" data-bs-toggle="tab" href="#all">
                        All Vendors (<span th:text="${#lists.size(allVendors)}"></span>)
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#pending">
                        <span class="text-warning fw-semibold">
                            Pending (<span th:text="${#lists.size(pendingVendors)}"></span>)
                        </span>
                    </a>
                </li>
            </ul>

            <div class="tab-content">
                <!-- All Vendors Tab -->
                <div class="tab-pane fade show active" id="all">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover align-middle mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="ps-4">Shop Name</th>
                                            <th>Category</th>
                                            <th>Owner</th>
                                            <th>Status</th>
                                            <th>Avg Time</th>
                                            <th class="pe-4">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="vendor : ${allVendors}">
                                            <td class="ps-4">
                                                <div class="fw-semibold" th:text="${vendor.shopName}"></div>
                                                <small class="text-muted" th:text="${vendor.address}"></small>
                                            </td>
                                            <td><span class="badge bg-light text-dark border"
                                                       th:text="${vendor.category ?: 'General'}"></span></td>
                                            <td>
                                                <div th:text="${vendor.user.name}"></div>
                                                <small class="text-muted" th:text="${vendor.user.email}"></small>
                                            </td>
                                            <td>
                                                <span th:if="${vendor.approved}" class="badge bg-success rounded-pill">
                                                    <i class="fas fa-check me-1"></i>Approved
                                                </span>
                                                <span th:unless="${vendor.approved}" class="badge bg-warning text-dark rounded-pill">
                                                    <i class="fas fa-clock me-1"></i>Pending
                                                </span>
                                            </td>
                                            <td th:text="${vendor.avgServiceTime} + ' min'"></td>
                                            <td class="pe-4">
                                                <div class="d-flex gap-2">
                                                    <form th:unless="${vendor.approved}"
                                                          th:action="@{/admin/vendors/{id}/approve(id=${vendor.id})}" method="post">
                                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                        <button class="btn btn-sm btn-success rounded-pill px-3">
                                                            <i class="fas fa-check me-1"></i>Approve
                                                        </button>
                                                    </form>
                                                    <form th:if="${vendor.approved}"
                                                          th:action="@{/admin/vendors/{id}/reject(id=${vendor.id})}" method="post">
                                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                                        <button class="btn btn-sm btn-outline-warning rounded-pill px-3">
                                                            <i class="fas fa-ban me-1"></i>Revoke
                                                        </button>
                                                    </form>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pending Tab -->
                <div class="tab-pane fade" id="pending">
                    <div th:if="${#lists.isEmpty(pendingVendors)}" class="text-center py-5">
                        <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                        <h5>All caught up!</h5>
                        <p class="text-muted">No pending vendor approvals</p>
                    </div>
                    <div class="row g-3" th:unless="${#lists.isEmpty(pendingVendors)}">
                        <div class="col-md-6" th:each="vendor : ${pendingVendors}">
                            <div class="card border-0 shadow-sm rounded-4">
                                <div class="card-body p-4">
                                    <div class="d-flex justify-content-between mb-3">
                                        <h5 class="fw-bold mb-0" th:text="${vendor.shopName}"></h5>
                                        <span class="badge bg-warning text-dark">Pending</span>
                                    </div>
                                    <p class="text-muted small mb-1">
                                        <i class="fas fa-user me-2"></i><span th:text="${vendor.user.name}"></span>
                                    </p>
                                    <p class="text-muted small mb-1">
                                        <i class="fas fa-envelope me-2"></i><span th:text="${vendor.user.email}"></span>
                                    </p>
                                    <p class="text-muted small mb-3" th:if="${vendor.description}">
                                        <span th:text="${vendor.description}"></span>
                                    </p>
                                    <div class="d-flex gap-2">
                                        <form th:action="@{/admin/vendors/{id}/approve(id=${vendor.id})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button class="btn btn-success rounded-3 px-4">
                                                <i class="fas fa-check me-2"></i>Approve
                                            </button>
                                        </form>
                                        <form th:action="@{/admin/vendors/{id}/reject(id=${vendor.id})}" method="post">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                            <button class="btn btn-outline-danger rounded-3 px-4">
                                                <i class="fas fa-times me-2"></i>Reject
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
