<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - UQS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="auth-bg">
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="col-md-6 col-lg-4 text-center">
        <div class="card border-0 shadow-lg rounded-4 p-5">
            <div class="mb-4">
                <i class="fas fa-exclamation-triangle fa-4x text-warning"></i>
            </div>
            <h3 class="fw-bold mb-2">Oops! Something went wrong</h3>
            <p class="text-muted mb-1" th:if="${errorType}">
                <span class="badge bg-danger" th:text="${errorType}"></span>
            </p>
            <p class="text-muted mb-4" th:text="${errorMessage}">An unexpected error occurred.</p>
            <div class="d-grid gap-2">
                <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-3">
                    <i class="fas fa-arrow-left me-2"></i>Go Back
                </a>
                <a href="/login" class="btn btn-primary rounded-3">
                    <i class="fas fa-home me-2"></i>Go to Home
                </a>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
